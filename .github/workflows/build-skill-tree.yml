name: Build skill tree widget

on:
  push:
    paths:
      - 'scripts/skill-tree-graph/**'
      - '.github/workflows/build-skill-tree.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prebuild:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run skill-tree-graph prebuild
        run: bash scripts/skill-tree-graph/prebuild.sh

      - name: Commit generated include
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _includes/skill-tree.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync _includes/skill-tree.html from scripts/skill-tree-graph"
            git push
          fi
